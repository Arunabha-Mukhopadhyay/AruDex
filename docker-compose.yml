services:
  backend:
    build: ./backend
    container_name: arudex-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PROVIDER_URL: http://hardhat:8545
      STRATEGY_AGENT_URL: http://agents:5000/api/strategy
      EXECUTION_AGENT_URL: http://agents:5000/api/execution
    depends_on:
      - hardhat
      - agents
    restart: unless-stopped
    command: ["sh", "-c", "chmod +x ./wait-for-hardhat.sh && ./wait-for-hardhat.sh hardhat:8545 60 && npm run start"]

  frontend:
    build:
      context: ./Frontend/dex_frontend
      args:
        VITE_BACKEND_URL: http://backend:3000
    container_name: arudex-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  agents:
    build: ./Agents
    container_name: arudex-agents
    ports:
      - "5001:5000"
    env_file:
      - .env
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:?GROQ_API_KEY is required for the agents service}
    restart: unless-stopped

  hardhat:
    build:
      context: .
      dockerfile: Dockerfile.hardhat
    container_name: arudex-hardhat
    ports:
      - "8545:8545"
    env_file:
      - .env
    restart: unless-stopped
